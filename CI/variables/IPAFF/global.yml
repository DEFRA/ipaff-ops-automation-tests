parameters:
  - name: environment
    type: string
  - name: workers
    type: string
  - name: seleniumGrid
    type: string
  - name: deviceName
    type: string
  - name: bsOSVersion
    type: string
  - name: bsBrowserVersion
    type: string
  - name: target
    type: string
  - name: isEmulationEnabled
    type: string
  - name: emulateDeviceInfo
    type: string
  - name: idcomsUrl
    type: string
  - name: idcomsUsername
    type: string
  - name: idcomsPassword
    type: string
  - name: pimsUrl
    type: string
  - name: pimsUsername
    type: string
  - name: pimsPassword
    type: string
  - name: isAccessibilityEnabled
    type: boolean
    default: false

variables:
  RunTrigger: 'devpipeline'
  Build: ADO_PETS_AP_Tests_$(Build.BuildNumber)
  Environment: ${{ parameters.environment }}
  Workers: ${{ parameters.workers }}
  SeleniumGrid: ${{ parameters.seleniumGrid }}
  DeviceName: ${{ parameters.deviceName }}
  BSOSVersion: ${{ parameters.bsOSVersion }}
  BSBrowserVersion: ${{ parameters.bsBrowserVersion }}  
  Target: ${{ parameters.target }}
  IsEmulationEnabled: ${{ parameters.isEmulationEnabled }}
  EmulateDeviceInfo: ${{ parameters.emulateDeviceInfo }}
  IDCOMSUrl: ${{ parameters.idcomsUrl }}
  IDCOMSUser: ${{ parameters.idcomsUsername }}
  IDCOMSPassword: ${{ parameters.idcomsPassword }}
  PIMSUrl: ${{ parameters.pimsUrl }}
  PIMSUser: ${{ parameters.pimsUsername }}
  PIMSPassword: ${{ parameters.pimsPassword }}
  IsAccessibilityEnabled: ${{ parameters.isAccessibilityEnabled }}