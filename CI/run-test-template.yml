parameters:
  - name: jobName
    type: string
  - name: environment
    type: string
  - name: branchName
    type: string
  - name: seleniumGrid
    type: string
    default: 'http://localhost:4444'
  - name: deviceName
    type: string
  - name: bsOSVersion
    type: string
  - name: dependsOn
    type: string
  - name: workers
    type: string
  - name: bsBrowserVersion
    type: string
  - name: target
    type: string
  - name: isEmulationEnabled
    type: string
  - name: emulateDeviceInfo
    type: string
  - name: application
    type: string
  - name: filterTestCases
    type: string
    default: ''
  - name: isAccessibilityEnabled
    type: boolean
    default: false

jobs: 

- job: ${{ parameters.jobName }}
  displayName: ${{ parameters.jobName }}
  timeoutInMinutes: 300

  pool:
    ${{ if contains(parameters.seleniumGrid, 'localhost') }}:
      name: 'DEFRA-COMMON-ubuntu2004-SSV3'
    ${{ if contains(parameters.seleniumGrid, 'browserstack') }}:
      name: 'DEFRA-TRD'

  variables:
    - group: 'IPAFFPREPROD'
    - template: 'variables/${{parameters.application}}/global.yml'
      parameters:
        environment: ${{parameters.environment}}
        workers: ${{parameters.workers}}
        seleniumGrid: ${{parameters.seleniumGrid}}
        deviceName: ${{parameters.deviceName}}
        bsOSVersion: ${{parameters.bsOSVersion}}
        bsBrowserVersion:  ${{parameters.bsBrowserVersion}}
        target:  ${{parameters.target}}
        isEmulationEnabled:  ${{parameters.isEmulationEnabled}}
        emulateDeviceInfo:  ${{parameters.emulateDeviceInfo}}        
        isAccessibilityEnabled: ${{parameters.isAccessibilityEnabled}}
    - name: FilterTestCases
      ${{ if eq(parameters.filterTestCases, '') }}:
        value: $(FilterTestCategory)
      ${{ else }}:
        value: ${{parameters.filterTestCases}}

  steps:
  
    - task: DownloadBuildArtifacts@0
      displayName: TestArtifact
      inputs:
        buildType: 'specific'
        project: '303b7da1-1c89-467e-9730-12849c222832'
        pipeline: '10248'
        buildVersionToDownload: 'latestFromBranch'
        branchName: ${{ parameters.branchName }}
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(System.ArtifactsDirectory)'

    - task: CopyFiles@2
      displayName: 'Copy Test Artifacts'
      inputs:
        SourceFolder: '$(System.ArtifactsDirectory)/drop'
        TargetFolder: $(System.DefaultWorkingDirectory)
        OverWrite: true
        CleanTargetFolder: true
    
    - task: ExtractFiles@1
      inputs:
        archiveFilePatterns: '**/Defra.UI.Tests.zip'
        destinationFolder: '$(System.DefaultWorkingDirectory)/Defra.UI.Tests'
        cleanDestinationFolder: false
        overwriteExistingFiles: true
    
    - task: replacetokens@3
      displayName: Replace Tokens for appsettings
      inputs:
        rootDirectory: '$(System.DefaultWorkingDirectory)/Defra.UI.Tests'
        targetFiles: 'appsettings.json'
        encoding: auto
        writeBOM: true
        escapeType: json
        actionOnMissing: warn
        keepToken: false
        tokenPrefix: '#{{'
        tokenSuffix: '}}'
        useLegacyPattern: false
        enableTelemetry: false

    - powershell: |
        $jsonString = Get-Content "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/appsettings.json" | Out-String
        Write-Host $jsonString
      displayName: 'Display appsettings.json'

    - task: replacetokens@3
      displayName: Replace Tokens for Power Apps configuration files
      inputs:
        rootDirectory: '$(System.DefaultWorkingDirectory)/Defra.UI.Tests'
        targetFiles: 'power-apps-bindings*.yml'
        encoding: auto
        writeBOM: true
        escapeType: json
        actionOnMissing: warn
        keepToken: false
        tokenPrefix: '#{{'
        tokenSuffix: '}}'
        useLegacyPattern: false
        enableTelemetry: false

    - powershell: |
        $ymlString = Get-Content "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/power-apps-bindings.yml" | Out-String
        Write-Host $ymlString
      displayName: 'Display power-apps-bindings.yml'

    - ${{ if contains(parameters.seleniumGrid, 'localhost:') }}:
      - powershell:
          docker system prune -a --volumes --force
        displayName: 'Stop and Clean all containers'

    - ${{ if contains(parameters.seleniumGrid, 'localhost:') }}:
      - task: DockerCompose@0
        displayName: Run a Docker Compose command
        inputs:
          action: Run a Docker Compose command
          workingDirectory: $(System.DefaultWorkingDirectory)/Defra.UI.Tests
          dockerComposeFile: $(System.DefaultWorkingDirectory)/Defra.UI.Tests/docker-compose-grid.yml 
          projectName: defra-ui-tests
          qualifyImageNames: true
          dockerComposeCommand: up -d
          #arguments: '--exit-code-from selenium-hub'

    - powershell: |
          Set-Location -Path "$(System.DefaultWorkingDirectory)/Defra.UI.Tests"
          $filterTestCases = "$(FilterTestCases)"
          dotnet test "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/Defra.UI.Tests.dll" --settings "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/testrun_${{ parameters.workers }}.runsettings" --filter "$filterTestCases" --logger:"trx;logfilename=${{ parameters.jobName }}_results_0.trx"
      displayName: 'Execute Tests'
      failOnStderr: true
      ignoreLASTEXITCODE: true
      continueOnError: true

    - powershell: |
         
            $projectDllPath = "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/Defra.UI.Tests.dll"
            $maxRetries = 3
  
            $resultsDir = "TestResults"
            $attempt = 0
            $failedTests = @()

            # Ensure results directory exists
            if (-not (Test-Path $resultsDir)) {
                New-Item -ItemType Directory -Path $resultsDir | Out-Null
            }

            do {
                
                if ($attempt -eq 0) {
                    $trxFile = "Defra.UI.Tests/${resultsDir}/${{ parameters.jobName }}_results_${attempt}.trx"
                }
                else {
                    $trxFile = "${resultsDir}/${{ parameters.jobName }}_results_${attempt}.trx"
                }

                [xml]$trx = Get-Content $trxFile

                $failedTests = $trx.TestRun.Results.UnitTestResult |
                    Where-Object { $_.outcome -eq "Failed" } |
                    ForEach-Object {
                        $name = $_.testName
                        if ($name.Contains('(')) {
                            $cleanName = $name.Substring(0, $name.IndexOf('('))
                        } else {
                            $cleanName = $name
                        }

                        $cleanName
                     }| 
                     Sort-Object | 
                     Get-Unique
                
                if ($failedTests.Count -gt 0 -and $attempt -lt $maxRetries) {
                    Write-Host "Found $($failedTests.Count) failed test(s). Preparing to rerun..."

                    $filterExpr = ($failedTests | ForEach-Object { "FullyQualifiedName~$_" }) -join '|'

                    Write-Host "Rerunning failed tests with filter: $filterExpr"

                    $attempt++

                    $nextTrxFile = "${{ parameters.jobName }}_results_${attempt}.trx"

                    dotnet test $projectDllPath --filter "$filterExpr" --logger:"trx;LogFileName=${nextTrxFile}"
                }

            } while ($failedTests.Count -gt 0 -and $attempt -lt $maxRetries)

            Write-Host "Test rerun process complete."

            # Merge all trx files into one

            $initialRunResult = "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestResults"
            $retryRunResult = "$(System.DefaultWorkingDirectory)/TestResults"
            $mergedTrxPath = "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestResults/${{ parameters.jobName }}_MergedResults.trx"

            $trxFiles = @( 
                Get-ChildItem -Path $initialRunResult -Filter "*.trx" -Recurse
                Get-ChildItem -Path $retryRunResult -Filter "*.trx" -Recurse
            )

            $latestResults = @{}
            $unitTestDefinitions = @{}

            foreach ($file in $trxFiles) {
                [xml]$xml = Get-Content $file.FullName

                foreach ($unitTest in $xml.TestRun.TestDefinitions.UnitTest) {
                    $name = $unitTest.name
                    $unitTestDefinitions[$name] = $unitTest
                }

                foreach ($result in $xml.TestRun.Results.UnitTestResult) {
                    $name = $result.testName
                    $endTime = [datetime]$result.endTime

                    if (-not $latestResults.ContainsKey($name) -or $endTime -gt $latestResults[$name].endTime) {
                        $latestResults[$name] = $result
                    }
                }
            }

            # Use the first .trx file as a base
            [xml]$finalTrx = Get-Content "$(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestResults/${{ parameters.jobName }}_results_0.trx"

            $namespaceManager = New-Object System.Xml.XmlNamespaceManager($finalTrx.NameTable)
            $namespaceManager.AddNamespace("ns", $finalTrx.DocumentElement.NamespaceURI)

            # Clear existing results and definitions
            $finalTrx.TestRun.Results.RemoveAll()
            $finalTrx.TestRun.TestDefinitions.RemoveAll()

            # Add latest results and matching definitions
            foreach ($name in $latestResults.Keys) {
                $result = $latestResults[$name]
                $definition = $unitTestDefinitions[$name]

                if ($definition -and $result) {
                    $importedResult = $finalTrx.ImportNode($result, $true)
                    $finalTrx.SelectSingleNode("//ns:Results", $namespaceManager).AppendChild($importedResult) | Out-Null
                    
                    $importedDef = $finalTrx.ImportNode($definition, $true)
                    $finalTrx.SelectSingleNode("//ns:TestDefinitions", $namespaceManager).AppendChild($importedDef) | Out-Null
                }
            }

            # Save the final merged .trx file
            $finalTrx.Save($mergedTrxPath)

            Write-Host "Merged .trx file saved to: $mergedTrxPath"

            exit 0
      displayName: 'Retry Failed Tests'
      failOnStderr: false

    - ${{ if contains(parameters.seleniumGrid, 'localhost:') }}:
      - task: DockerCompose@0
        displayName: Run a Docker Compose command
        inputs:
          action: Run a Docker Compose command
          workingDirectory: $(System.DefaultWorkingDirectory)/Defra.UI.Tests
          dockerComposeFile: $(System.DefaultWorkingDirectory)/Defra.UI.Tests/docker-compose-grid.yml 
          projectName: defra-ui-tests
          qualifyImageNames: true
          dockerComposeCommand: down
    
    - powershell: |
        Set-Location -Path "$(System.DefaultWorkingDirectory)/Defra.UI.Tests"
        Get-Content -Path TestExecution.json
      displayName: 'Display Test Exe Json'
      failOnStderr: true
      ignoreLASTEXITCODE: true
      continueOnError: true

    - powershell: |
        Set-Location -Path "$(System.DefaultWorkingDirectory)/Defra.UI.Tests"
        Rename-Item -Path "TestExecution.json" -NewName "TestExecution_${{ parameters.jobName }}.json"            
        Get-Content -Path $(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestExecution_${{ parameters.jobName }}.json
      displayName: 'Display TestExecution_${{ parameters.jobName }}.json'
      failOnStderr: true
      ignoreLASTEXITCODE: true
      continueOnError: true
      condition: always() # this step will always run, even if the pipeline is canceled

    - task: PublishPipelineArtifact@0
      displayName: 'Publish Json reports for Specflow'
      inputs:
          testResultsFiles: 'TestExecution_${{ parameters.jobName }}.json'
          artifactName: TestExecution_${{ parameters.jobName }}
          targetPath: '$(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestExecution_${{ parameters.jobName }}.json'
    
    - script: |
        mkdir -p $(System.DefaultWorkingDirectory)/Defra.UI.Tests/Reports/Screenshots
        mkdir -p $(System.DefaultWorkingDirectory)/Defra.UI.Tests/Reports
        
        # Find and copy all PNG files from TestResults
        find $(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestResults -name "*.png" -exec cp {} $(System.DefaultWorkingDirectory)/Defra.UI.Tests/Reports/Screenshots/ \;
        
        # Copy HTML reports if they exist
        find $(System.DefaultWorkingDirectory)/Defra.UI.Tests -name "TestExecutionReport_*.html" -exec cp {} $(System.DefaultWorkingDirectory)/Defra.UI.Tests/Reports/ \;
      displayName: 'Copy reports and screenshots'
      condition: always()
      continueOnError: true

    - task: PublishPipelineArtifact@0
      displayName: 'Publish Html Report and screenshots'
      inputs:
          artifactName: ${{ parameters.jobName }}_TestReport
          targetPath: '$(System.DefaultWorkingDirectory)/Defra.UI.Tests/Reports/'
      condition: always()
      continueOnError: true

    - task: PublishTestResults@2
      displayName: 'Publish Test Results'
      inputs:
        testResultsFormat: VSTest
        testResultsFiles: '${{ parameters.jobName }}_MergedResults.trx'
        searchFolder: '$(System.DefaultWorkingDirectory)/Defra.UI.Tests/TestResults'
        testRunTitle: ${{ parameters.jobName }}
        failTaskOnFailedTests: true
        continueOnError: true