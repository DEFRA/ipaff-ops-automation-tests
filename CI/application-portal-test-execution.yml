trigger: none

parameters:  
  - name: environment
    displayName: Environment
    type: string
    default: 'pre'
  - name: workers
    displayName: Number of Workers
    type: string
    default: '10'
  - name: seleniumGrid
    displayName: Selenium Grid URL
    type: string
    default: 'http://localhost:4444'
  - name: deviceName
    displayName: Device Name
    type: string
    default: 'Windows'
  - name: bsOSVersion
    displayName: BrowserStack OS Version
    type: string
    default: '11'
  - name: bsBrowserVersion
    displayName: BrowserStack Browser Version
    type: string
    default: 'latest'
  - name: target
    displayName: Target Browser
    type: string
    default: 'Chrome'
  - name: isEmulationEnabled
    displayName: Enable Emulation
    type: string
    default: 'false'
  - name: emulateDeviceInfo
    displayName: Emulated Device Info
    type: string
    default: 'iPhone 12 Pro'
  - name: isAccessibilityEnabled
    displayName: Is Accessibility Run Enabled
    type: boolean
    default: false
  - name: testCategory
    displayName: Test Category
    type: string
    default: 'Regression'
    values:
      - Regression
      - Dynamics
      - CHEDA
      - CHEDD
      - CHEDP
      - CHEDPP
      - RiskEngine

resources:
  repositories:
    - repository: ipaffopsprovingrepo
      type: github
      name: DEFRA/ipaff-ops-automation-tests
      ref: $(Build.SourceBranch)
      endpoint: DEFRA

stages:
  
  - stage: IPAFF_OPS_E2E
    displayName: IPAFF_OPS_E2E

    variables:
    - template: 'variables/IPAFF/${{parameters.environment}}.yml'

    jobs:
    
    - template: run-test-template.yml
      parameters:
        jobName: IPAFF_OPS_E2E
        environment: ${{ parameters.environment}}
        branchName: $(Build.SourceBranch)
        seleniumGrid: ${{parameters.seleniumGrid}}  
        deviceName: ${{parameters.deviceName}}
        bsOSVersion: ${{parameters.bsOSVersion}}
        workers:  ${{parameters.workers}}
        bsBrowserVersion: 'latest'
        target: ${{parameters.target}}
        isEmulationEnabled: ${{parameters.isEmulationEnabled}}
        emulateDeviceInfo: ${{parameters.emulateDeviceInfo}}
        isAccessibilityEnabled: ${{ parameters.isAccessibilityEnabled }}
        application: 'IPAFF'
        dependsOn: ''
        filterTestCases: 'TestCategory=${{ parameters.testCategory }}'